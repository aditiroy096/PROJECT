<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP 1 - IIoT CLOUD DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #12151c; --card-bg: #1c202a; --text-main: #e6e6e6;
            --accent: #00a8ff; --green: #2ecc71; --red: #e74c3c; --border: #343a46;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-dark);
            color: var(--text-main); margin: 0; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border);
            margin-bottom: 30px; position: relative;
        }
        .header h1 { margin: 0; font-size: 26px; letter-spacing: 1px; }
        .header p { color: var(--accent); margin: 5px 0; font-weight: 600; }
        
        /* Cloud Status Indicator */
        .status-box {
            position: absolute; top: 0; right: 0; font-size: 13px;
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online-dot { background-color: var(--green); box-shadow: 0 0 8px var(--green); }
        .offline-dot { background-color: var(--red); }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); border-radius: 15px; padding: 25px;
            border: 1px solid var(--border); transition: 0.3s; text-align: center;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .label { font-size: 14px; color: #a0a0a0; margin-bottom: 15px; text-transform: uppercase; }
        .value { font-size: 42px; font-weight: 700; }
        .unit { font-size: 20px; color: #a0a0a0; }
        .status-text { font-size: 24px; font-weight: 600; color: var(--green); }
        .alert { color: var(--red) !important; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* Control Switches */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; margin-top: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="status-box">
                <span id="dot" class="dot offline-dot"></span>
                <span id="status-text">Server Connecting...</span>
            </div>
            <h1>IIoT CLOUD FAULT DETECTION SYSTEM</h1>
            <p>FINAL YEAR B.TECH PROJECT - GROUP 1 (JIT NAGPUR)</p>
            <small style="color: #666;">Members: Tarun, Aniket, Samiksha, Pratyaksh, Dipak</small>
        </div>

        <div class="grid">
            <div class="card">
                <div class="label">Temperature</div>
                <div class="value"><span id="temp-val">--</span><span class="unit">°C</span></div>
            </div>
            <div class="card">
                <div class="label">Humidity</div>
                <div class="value"><span id="hum-val">--</span><span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="label">Gas/Smoke</div>
                <div class="value"><span id="smoke-val">--</span><span class="unit">ppm</span></div>
            </div>

            <div class="card">
                <div class="label">Fire Sensor</div>
                <div id="fire-stat" class="status-text">Normal</div>
            </div>
            <div class="card">
                <div class="label">PIR Sensor</div>
                <div id="pir-stat" class="status-text">No Motion</div>
            </div>

            <div class="card">
                <div class="label">3-Phase Motor</div>
                <label class="switch">
                    <input type="checkbox" id="motor-sw" onchange="sendCmd('motor', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="card">
                <div class="label">Industrial Load 1</div>
                <label class="switch">
                    <input type="checkbox" id="load1-sw" onchange="sendCmd('load1', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Cloud Connection Status Logic
        socket.on('connect', () => {
            document.getElementById('dot').className = 'dot online-dot';
            document.getElementById('status-text').innerText = 'Cloud Live';
        });

        socket.on('disconnect', () => {
            document.getElementById('dot').className = 'dot offline-dot';
            document.getElementById('status-text').innerText = 'Connection Lost';
        });

        // Real-time Update Logic
        socket.on('sensorUpdate', (data) => {
            document.getElementById('temp-val').innerText = data.temperature;
            document.getElementById('hum-val').innerText = data.humidity;
            document.getElementById('smoke-val').innerText = data.smoke;
            
            // Fire Alert Logic
            const fire = document.getElementById('fire-stat');
            if(data.fire) { 
                fire.innerText = "FIRE DETECTED!"; 
                fire.classList.add('alert'); 
            } else { 
                fire.innerText = "Normal"; 
                fire.classList.remove('alert'); 
            }

            // PIR Alert Logic
            const pir = document.getElementById('pir-stat');
            if(data.pir) { 
                pir.innerText = "MOTION!"; 
                pir.classList.add('alert'); 
            } else { 
                pir.innerText = "No Motion"; 
                pir.classList.remove('alert'); 
            }

            // Sync Toggle States (Hardware to Web)
            document.getElementById('motor-sw').checked = data.motorState;
            document.getElementById('load1-sw').checked = data.load1State;
        });

        // Control Sending Logic (Web to Hardware)
        function sendCmd(device, state) {
            fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device, state: state ? 'on' : 'off' })
            });
        }
    </script>
</body>
</html>
