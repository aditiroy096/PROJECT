<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP 1 - ONLINE DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- AAPKA WAHI PURANA STYLISH CSS --- */
        :root {
            --bg-dark-primary: #12151c; --bg-dark-secondary: #1c202a; --text-primary: #e6e6e6;
            --text-secondary: #a0a0a0; --accent-blue: #00a8ff; --accent-green: #2ecc71;
            --accent-red: #e74c3c; --border-color: #343a46;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark-primary); color: var(--text-primary); margin: 0; padding: 24px; }
        .dashboard { display: flex; flex-direction: column; gap: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .title-container { flex-grow: 1; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--accent-red); }
        .status-dot.online { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .widget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        .card { background-color: var(--bg-dark-secondary); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; }
        .sensor-value { font-size: 48px; font-weight: 700; text-align: center; }
        .sensor-value .unit { font-size: 24px; color: var(--text-secondary); }
        .sensor-status { font-size: 28px; font-weight: 600; text-align: center; color: var(--accent-green); }
        .sensor-status.alert { color: var(--accent-red); }
        /* Switch Styles */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked+.slider { background-color: var(--accent-green); }
        input:checked+.slider:before { transform: translateX(26px); }
        .toggle-switch-container { display: flex; justify-content: space-between; align-items: center; }
        
        /* Modal for Alerts */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-dark-secondary); padding: 30px; border-radius: 16px; border: 2px solid var(--accent-red); text-align: center; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="title-container">
                <h1>IIoT Cloud Monitoring & Fault Detection</h1>
                <p style="color: var(--accent-blue); margin: 5px 0;">Nagpur Engineering Group 1 Project</p>
            </div>
            <div class="status-indicator">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Cloud Offline</span>
            </div>
        </header>

        <div class="widget-grid">
            <div class="card"><div class="card-header"><span>Temperature</span></div><div class="sensor-value"><span id="temp-value">--</span><span class="unit">°C</span></div></div>
            <div class="card"><div class="card-header"><span>Humidity</span></div><div class="sensor-value"><span id="humidity-value">--</span><span class="unit">%</span></div></div>
            <div class="card"><div class="card-header"><span>Smoke</span></div><div class="sensor-value"><span id="smoke-value">--</span><span class="unit">ppm</span></div></div>
            <div class="card"><div class="card-header"><span>Fire Status</span></div><div class="sensor-status" id="fire-status">Clear</div></div>
            <div class="card"><div class="card-header"><span>3-Phase Motor</span></div><div class="toggle-switch-container"><label class="switch"><input type="checkbox" id="motor-toggle" onchange="sendToggleControl('motor', this.checked)"><span class="slider"></span></label></div></div>
            </div>
    </div>

    <div id="alert-modal" class="modal">
        <div class="modal-content">
            <h2 id="alert-title" style="color: var(--accent-red);">🚨 ALERT 🚨</h2>
            <p id="alert-msg">Hazardous condition detected!</p>
            <button onclick="document.getElementById('alert-modal').style.display='none'" style="padding: 10px 20px; cursor: pointer;">Acknowledge</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        socket.on('connect', () => {
            statusDot.classList.add('online');
            statusText.textContent = 'Cloud Online';
        });

        socket.on('disconnect', () => {
            statusDot.classList.remove('online');
            statusText.textContent = 'Cloud Offline';
        });

        // Receiving Data from ESP8266 (via Server)
        socket.on('sensorUpdate', (data) => {
            document.getElementById('temp-value').textContent = data.temperature.toFixed(1);
            document.getElementById('humidity-value').textContent = data.humidity.toFixed(1);
            document.getElementById('smoke-value').textContent = data.smoke;
            
            // Fire Alert Logic
            const fireEl = document.getElementById('fire-status');
            if(data.fire) {
                fireEl.textContent = "DETECTED!";
                fireEl.classList.add('alert');
                showAlert("FIRE ALERT", "Fire detected in the system!");
            } else {
                fireEl.textContent = "Clear";
                fireEl.classList.remove('alert');
            }

            // Sync Toggle States
            document.getElementById('motor-toggle').checked = data.motorState;
        });

        function sendToggleControl(device, isChecked) {
            const state = isChecked ? 'on' : 'off';
            // Sending command to server, which ESP8266 will fetch
            fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device, state })
            });
        }

        function showAlert(title, msg) {
            document.getElementById('alert-modal').style.display = 'flex';
            document.getElementById('alert-title').textContent = title;
            document.getElementById('alert-msg').textContent = msg;
        }
    </script>
</body>
</html>
